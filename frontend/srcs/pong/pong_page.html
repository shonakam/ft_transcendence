<!DOCTYPE html>
<html>
<head>
    <title>Pong Game</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="pong_page.css">
</head>
<body>
    <h1>Pong Game</h1>
    
    <div class="score-board">
        <div class="player-score">
            <div class="score-label">Player1</div>
            <div id="playerScore">0</div>
        </div>
        <div class="player-score">
            <div class="score-label">Player2</div>
            <div id="aiScore">0</div>
        </div>
    </div>
    
    <div class="game-container hockey-field">
        <canvas id="myCanvas" width="732" height="366"></canvas>
        <div class="goal-left"></div>
        <div class="goal-right"></div>
    </div>
    
    <div class="controls">
        <p>Use mouse or arrow keys to control your paddle</p>
        <p>First to reach 3 points wins!</p>
    </div>
    
    <script type="module" src="pong/game.js"></script>
</body>
</html>
