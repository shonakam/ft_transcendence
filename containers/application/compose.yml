x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-file: "10"
      max-size: "100m"

networks:
  transcendence-network:
    name: transcendence-network

volumes:
  storage:
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR}

secrets:
  nginx_certificate:
    file: .secrets/certs/transcenders.42.fr.crt
  nginx_private_key:
    file: .secrets/certs/stranscenders.42.fr.key

####

services:
  frontend:
    init: true
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: ft-frontend
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-5173}:${FRONTEND_INTERNAL_PORT:-5173}"
    volumes:
      - ./frontend:/app
      - "/app/node_modules"
    networks:
      - transcendence-network
    <<: *logging

  backend:
    init: true
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ft-backend
    ports:
      - "${BACKEND_EXTERNAL_PORT:-8080}:${BACKEND_INTERNAL_PORT:-8080}"
    volumes:
      - ./backend:/app
      - storage:/var/lib/sqlite
      - "/app/node_modules"
    networks:
      - transcendence-network
    restart: unless-stopped
    <<: *logging

  database:
    init: true
    build:
      context: ./sqlite
      dockerfile: Dockerfile
    container_name: ft-database
    # ports: Planned update to PSQL
    #   - "5432:5432" 
    volumes:
      - storage:/var/lib/sqlite
    restart: unless-stopped

  redis:
    init: true
    build:
      context: ./redis
      dockerfile: Dockerfile
    container_name: ft-redis
    ports:
      - "${REDIS_HOST_PORT:-6379}:${REDIS_CONTAINER_PORT:-6379}"
    restart: unless-stopped
    tty: true
    networks:
      - transcendence-network
