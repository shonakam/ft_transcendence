<h2 class="text-2xl font-bold mb-6 text-center">新規登録</h2>
<form id="signup-form">

  <div class="mb-6 border p-4 rounded-lg bg-gray-50">
    <label class="block text-center text-gray-700 font-medium mb-3">アバター画像</label>

    <div id="avatar-preview-area" class="w-24 h-24 mx-auto mb-3 bg-gray-200 rounded-full flex items-center justify-center overflow-hidden border-2 border-gray-300">
        <span id="preview-text" class="text-xs text-gray-500">画像を選択</span>
        <img id="avatar-preview" class="hidden w-full h-full object-cover" src="" alt="アバタープレビュー">
    </div>

    <input type="file" id="avatar-upload-input" accept="image/*" class="hidden">
    <button type="button" id="upload-button" class="w-full bg-gray-300 hover:bg-gray-400 text-gray-800 font-bold py-2 px-4 rounded-lg text-sm transition duration-150">
        画像を選択
    </button>
  </div>

  <div class="mb-4">
    <label for="signup-username" class="block text-left text-gray-700">ユーザー名</label>
    <input type="text" id="signup-username" name="username" class="w-full px-3 py-2 border rounded-lg" placeholder="表示名">
  </div>

  <div class="mb-4">
    <label for="signup-email" class="block text-left text-gray-700">メールアドレス</label>
    <input type="email" id="signup-email" name="email" class="w-full px-3 py-2 border rounded-lg" placeholder="email@example.com">
  </div>

  <div class="mb-4">
    <label for="signup-password" class="block text-left text-gray-700">パスワード</label>
    <input type="password" id="signup-password" name="password" class="w-full px-3 py-2 border rounded-lg">
  </div>

  <div class="mb-6">
    <label for="signup-password-confirm" class="block text-left text-gray-700">パスワード (確認用)</label>
    <input type="password" id="signup-password-confirm" class="w-full px-3 py-2 border rounded-lg">
  </div>

  <div class="mb-6 flex items-center">
    <input type="checkbox" id="signup-2fa-enabled" name="is2faEnabled" class="h-4 w-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
    <label for="signup-2fa-enabled" class="ml-2 block text-sm text-gray-900">二段階認証 (2FA) を有効にする</label>
  </div>

  <button type="submit" id="signup-submit-button" class="w-full bg-blue-500 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded-lg">
    登録する
  </button>
</form>
<p class="mt-4 text-sm text-center">すでにアカウントをお持ちですか？ <button data-switch-view="login" class="font-medium text-blue-600 hover:underline">ログイン</button></p>
