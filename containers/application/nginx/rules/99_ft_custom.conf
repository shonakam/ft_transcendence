# =======================================================
# OWASP ModSecurity Core Rule Set (CRS)
# Protection Level 2 (PL2) Configuration
# =======================================================

# Set Paranoia Level to 2
# PL1: Basic security (default)
# PL2: Elevated security with more rules
# PL3: High security, may cause false positives
# PL4: Maximum security, high risk of false positives
SecAction \
  "id:900000,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.paranoia_level=2"

# Allow IP address in Host header (for LAN access)
SecRuleRemoveById 920350

# Disable SQL Comment Sequence Detection (false positive on "--" in JWT signature)
SecRuleRemoveById 942440

# Set enforcement mode
# SecRuleEngine DetectionOnly: Log only, don't block
# SecRuleEngine On: Block malicious requests
SecRuleEngine On

# Set anomaly scoring thresholds
# Lower values = stricter blocking
SecAction \
  "id:900110,\
   phase:1,\
   nolog,\
   pass,\
   t:none,\
   setvar:tx.inbound_anomaly_score_threshold=15,\
   setvar:tx.outbound_anomaly_score_threshold=4"
