x-logging: &logging
  logging:
    driver: "json-file"
    options:
      max-file: "10"
      max-size: "100m"

networks:
  transcendence-network:
    name: transcendence-network

volumes:
  storage:
    driver_opts:
      type: none
      o: bind
      device: ${DATA_DIR}

services:
  vault:
    build:
      context: ./vault
      dockerfile: Dockerfile
    container_name: ft-vault
    ports:
      - "8200:8200"
    environment:
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_TOKEN:-root}
    volumes:
      - ./vault/config/config.hcl:/vault/config/config.hcl
    cap_add:
      - IPC_LOCK
    networks:
      - transcendence-network
